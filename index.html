<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ギャングカラー検索</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #0b0b0f;
      color: #fff;
      font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      background: linear-gradient(135deg, #171720, #111);
      border: 1px solid #2b2b36;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 34px;
    }

    .desc {
      margin: 0;
      color: #b8b8c7;
      line-height: 1.7;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin: 20px 0;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #2b2b36;
      background: #121218;
      color: #fff;
      outline: none;
      font-size: 15px;
    }

    button {
      padding: 12px 16px;
      border-radius: 14px;
      border: 1px solid #2b2b36;
      background: #1b1b24;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #252532;
    }

    .meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      color: #b8b8c7;
      font-size: 14px;
    }

    .pill {
      background: #14141b;
      border: 1px solid #2b2b36;
      border-radius: 999px;
      padding: 8px 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }

    .card {
      background: #121218;
      border: 1px solid #2b2b36;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    .card h2 {
      margin: 0 0 6px;
      font-size: 20px;
      line-height: 1.4;
    }

    .note {
      color: #9d9db0;
      font-size: 13px;
      margin-bottom: 14px;
    }

    .row {
      background: #0d0d12;
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }

    .label {
      color: #8d8da3;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .value {
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #aaa;
      border: 1px dashed #333;
      border-radius: 18px;
      background: #121218;
    }

    @media (max-width: 700px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 28px;
      }

      .container {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>🎨 ギャングカラー検索</h1>
      <p class="desc">
        チーム名、色名、RGB、通称で検索できる一覧アプリです。
        GitHub Pagesにそのまま置ける1ファイル版です。
      </p>
    </div>

    <div class="toolbar">
      <input
        id="search"
        type="text"
        placeholder="検索: チーム名 / 色 / RGB / 通称 例) 青、ロギア、RGB(34,158,186)"
      />
      <button id="clearBtn">クリア</button>
    </div>

    <div class="meta">
      <div class="pill">登録チーム数: <span id="totalCount">0</span></div>
      <div class="pill">検索結果: <span id="resultCount">0</span></div>
    </div>

    <div id="list" class="grid"></div>
  </div>

  <script>
    const gangs = [
      {
        name: "lvy半グレ / まっくろくろす",
        aliases: ["lvy半グレ", "まっくろくろす", "紫", "パープル"],
        main: "アノダイズドパープル（カメレオン）",
        sub: "アノダイズドパープル（カメレオン）",
        pearlescent: "スピネーカーパープル（メタリック）",
        note: "紫系"
      },
      {
        name: "Fisher（青ギャング）",
        aliases: ["Fisher", "青ギャング", "青", "ブルー"],
        main: "アノダイズドブルー（カメレオン）",
        sub: "-",
        pearlescent: "-",
        note: "青系"
      },
      {
        name: "オレンジギャング",
        aliases: ["オレンジギャング", "オレンジ"],
        main: "オレンジ（マット）",
        sub: "-",
        pearlescent: "-",
        note: "オレンジ系"
      },
      {
        name: "Lui白 / アデルウルフ",
        aliases: ["Lui", "白", "アデルウルフ", "ミッドナイトブルー"],
        main: "ミッドナイトブルー（マット）",
        sub: "-",
        pearlescent: "ブラック（マット）",
        note: "白系呼称あり"
      },
      {
        name: "ばり紫",
        aliases: ["ばり紫", "紫", "パープル"],
        main: "アノダイズドパープル（カメレオン）",
        sub: "アノダイズドパープル（カメレオン）",
        pearlescent: "オフホワイト（カメレオン）",
        note: "紫系"
      },
      {
        name: "白ギャング",
        aliases: ["白ギャング", "白", "ホワイト"],
        main: "アイスホワイト",
        sub: "-",
        pearlescent: "-",
        note: "白系"
      },
      {
        name: "水色（旧水色ではない方）",
        aliases: ["水色", "新水色", "旧水色ではない方", "RGB(34,158,186)"],
        main: "RGB(34,158,186)",
        sub: "RGB(34,158,186)",
        pearlescent: "ブラック（マット）",
        note: "水色系"
      },
      {
        name: "水色ギャング",
        aliases: ["水色ギャング", "水色", "フブキ"],
        main: "フブキ（カメレオン）",
        sub: "フブキ（カメレオン）",
        pearlescent: "-",
        note: "水色系"
      },
      {
        name: "水色（おやま半ぐれ）",
        aliases: ["水色", "おやま半ぐれ", "RGB(143,229,255)"],
        main: "RGB(143,229,255)",
        sub: "RGB(143,229,255)",
        pearlescent: "アイスホワイト（メタリック）",
        note: "水色系"
      },
      {
        name: "空色",
        aliases: ["空色", "ライトブルー"],
        main: "55.ライトブルー（メタリック）",
        sub: "アイスホワイト（メタリック）",
        pearlescent: "アイスホワイト（メタリック）",
        note: "空色系"
      },
      {
        name: "黄緑半グレ",
        aliases: ["黄緑半グレ", "黄緑", "ライムグリーン"],
        main: "ライムグリーン（メタリック）",
        sub: "ライムグリーン（メタリック）",
        pearlescent: "ブラック（メタリック）",
        note: "黄緑系"
      },
      {
        name: "緑半ぐれ（白上さん）",
        aliases: ["緑半ぐれ", "白上さん", "ミッドナイトパープル"],
        main: "ミッドナイトパープル（マット）",
        sub: "ミッドナイトパープル（マット）",
        pearlescent: "ウルトラブルー（メタリック）",
        note: "名称は緑だが実色は紫寄り"
      },
      {
        name: "ザウバー",
        aliases: ["ザウバー", "RGB(0,50,50)", "青緑"],
        main: "RGB(0,50,50)（クラシック）",
        sub: "ブラック（メタリック）",
        pearlescent: "シルバー（メタリック）",
        note: "深青緑系"
      },
      {
        name: "青緑半ぐれ",
        aliases: ["青緑半ぐれ", "青緑", "グラファイト"],
        main: "グラファイト（メタリック）",
        sub: "ブラック（メタリック）",
        pearlescent: "ミッドナイトシルバー（メタリック）",
        note: "青緑系"
      },
      {
        name: "かすみさん半ぐれ",
        aliases: ["かすみさん半ぐれ", "RGB(14,43,43)", "RGB(8,8,8)"],
        main: "RGB(14,43,43)",
        sub: "RGB(8,8,8)",
        pearlescent: "アノダイズトグリーン（カメレオン）",
        note: "深緑黒系"
      },
      {
        name: "ノーネーム（紫ギャング）",
        aliases: ["ノーネーム", "紫ギャング", "シャフターパープル"],
        main: "メタリック シャフターパープル",
        sub: "メタリック ライムグリーン",
        pearlescent: "マット シャフターパープル",
        note: "紫＋黄緑"
      },
      {
        name: "影班（ロギアさん）",
        aliases: ["影班", "ロギアさん", "モノクローム"],
        main: "モノクローム（カメレオン）",
        sub: "モノクローム（カメレオン）",
        pearlescent: "モノクローム（カメレオン）",
        note: "モノクロ系"
      },
      {
        name: "青半グレ（かぶさん）",
        aliases: ["青半グレ", "かぶさん", "ブルー"],
        main: "ブルー（メタリック）",
        sub: "ブルー（メタリック）",
        pearlescent: "フブキ（カメレオン）",
        note: "青系"
      },
      {
        name: "茶色（リップ）",
        aliases: ["茶色", "リップ", "RGB(61,52,44)"],
        main: "RGB(61,52,44)",
        sub: "RGB(61,52,44)",
        pearlescent: "パイソンブラウン（メタリック）",
        note: "茶系"
      },
      {
        name: "黄色",
        aliases: ["黄色", "イエロー", "レースイエロー"],
        main: "レースイエロー（メタリック）",
        sub: "レースイエロー（メタリック）",
        pearlescent: "-",
        note: "黄系"
      },
      {
        name: "ピンク（Rosalia）",
        aliases: ["ピンク", "Rosalia", "RGB(245,150,189)", "RGB(174,165,212)"],
        main: "RGB(245,150,189) / RGB(174,165,212)",
        sub: "RGB(245,150,189)",
        pearlescent: "ホットピンク（メタリック）",
        note: "ピンク系"
      }
    ];

    const list = document.getElementById("list");
    const search = document.getElementById("search");
    const clearBtn = document.getElementById("clearBtn");
    const totalCount = document.getElementById("totalCount");
    const resultCount = document.getElementById("resultCount");

    function normalize(text) {
      return String(text || "")
        .toLowerCase()
        .replace(/[（）()［］[\]\s　\-]/g, "");
    }

    function copyGang(gang) {
      const text =
`【${gang.name}】
メイン: ${gang.main}
サブ: ${gang.sub}
パールセント: ${gang.pearlescent}`;
      navigator.clipboard.writeText(text);
    }

    function render(items) {
      list.innerHTML = "";
      resultCount.textContent = items.length;

      if (items.length === 0) {
        list.innerHTML = '<div class="empty">該当なし。検索ワードを変えてみてください。</div>';
        return;
      }

      items.forEach((gang) => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <h2>${gang.name}</h2>
          <div class="note">${gang.note}</div>

          <div class="row">
            <div class="label">メイン</div>
            <div class="value">${gang.main}</div>
          </div>

          <div class="row">
            <div class="label">サブ</div>
            <div class="value">${gang.sub}</div>
          </div>

          <div class="row">
            <div class="label">パールセント</div>
            <div class="value">${gang.pearlescent}</div>
          </div>

          <div class="row">
            <div class="label">検索タグ</div>
            <div class="value">${gang.aliases.join(" / ")}</div>
          </div>

          <div class="actions">
            <button type="button">コピー</button>
          </div>
        `;

        card.querySelector("button").addEventListener("click", () => copyGang(gang));
        list.appendChild(card);
      });
    }

    function filterGangs(keyword) {
      const q = normalize(keyword);
      if (!q) return gangs;

      return gangs.filter((gang) => {
        const haystack = normalize([
          gang.name,
          gang.main,
          gang.sub,
          gang.pearlescent,
          gang.note,
          ...(gang.aliases || [])
        ].join(" "));
        return haystack.includes(q);
      });
    }

    totalCount.textContent = gangs.length;
    render(gangs);

    search.addEventListener("input", () => {
      render(filterGangs(search.value));
    });

    clearBtn.addEventListener("click", () => {
      search.value = "";
      render(gangs);
      search.focus();
    });
  </script>
</body>
</html>
